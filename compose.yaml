services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - ./:/var/www/app:cached
        depends_on:
            database:
                condition: service_healthy
        env_file:
            - .env

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/app:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    database:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: eshop
            POSTGRES_USER: eshop
            POSTGRES_PASSWORD: eshop
        ports:
            - "5432:5432"
        volumes:
            - database_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U eshop"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    database_data:
