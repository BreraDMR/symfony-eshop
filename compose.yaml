services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - ./:/var/www/app:cached
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/app:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    database:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: eshop
            POSTGRES_USER: eshop
            POSTGRES_PASSWORD: eshop
        ports:
            - "5432:5432"
        volumes:
            - database_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U eshop"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: eshop
            RABBITMQ_DEFAULT_PASS: eshop
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    database_data:
