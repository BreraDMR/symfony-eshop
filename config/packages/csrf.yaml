# Classic, session-based CSRF protection for forms.
#
# Symfony's newer "stateless" CSRF relies on a Stimulus controller to inject
# the token on the client. This storefront renders its forms server-side with
# plain Twig and does not ship that JS controller, so we keep CSRF stateful and
# the token is rendered directly into the form.
framework:
    form:
        csrf_protection: true
