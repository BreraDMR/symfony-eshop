framework:
    cache:
        # The "app" cache stores to Redis so it is shared across web workers.
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        pools:
            # Dedicated tag-aware pool for storefront catalog reads, so the
            # whole catalog can be invalidated with a single tag.
            catalog.cache:
                adapter: cache.app
                tags: true
                default_lifetime: 3600

when@test:
    framework:
        cache:
            # Tests must not depend on a running Redis instance.
            app: cache.adapter.array
