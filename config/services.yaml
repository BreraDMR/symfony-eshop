# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Product\ImageUploader:
        arguments:
            $targetDirectory: '%kernel.project_dir%/public/images/products'

    # Shared Elasticsearch client, built from the configured endpoint.
    Elastic\Elasticsearch\Client:
        factory: ['App\Search\ElasticClientFactory', 'create']
        arguments:
            $endpoint: '%env(ELASTICSEARCH_URL)%'

    # Live indexing is turned off in tests so they stay independent of ES.
    App\Search\ProductSearchSubscriber:
        arguments:
            $enabled: '%env(bool:SEARCH_INDEXING_ENABLED)%'

    # The storefront search uses the Elasticsearch gateway implementation.
    App\Search\ProductSearchGateway: '@App\Search\ElasticsearchProductSearchGateway'

    App\Payment\StripePaymentGateway:
        arguments:
            $secretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Payment\PaymentGatewayFactory:
        arguments:
            $gateway: '%env(PAYMENT_GATEWAY)%'

    # The active gateway is resolved at runtime by the factory, so the rest of
    # the app only ever depends on the PaymentGatewayInterface abstraction.
    App\Payment\PaymentGatewayInterface:
        factory: ['@App\Payment\PaymentGatewayFactory', 'create']
